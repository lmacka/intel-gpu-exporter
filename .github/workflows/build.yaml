name: Build Docker

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: coopernetes-docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: tcp://buildkitd.ci.svc.cluster.local:1234

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:main
          cache-from: type=registry,ref=zot.registry.svc.cluster.local:5000/cache/intel-gpu-exporter:buildcache
          cache-to: type=registry,ref=zot.registry.svc.cluster.local:5000/cache/intel-gpu-exporter:buildcache,mode=max
